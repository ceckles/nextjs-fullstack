name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ secrets.VERCEL_PROD_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}

      - name: Get production URL
        id: deployment
        run: |
          PROD_URL="${{ secrets.VERCEL_PROD_URL }}"
          echo "url=$PROD_URL" >> $GITHUB_OUTPUT

      - name: Production Health Check
        run: |
          sleep 30
          HEALTH_URL="${{ secrets.VERCEL_PROD_URL }}/api/health"
          echo "Checking production health at: $HEALTH_URL"
          
          for i in {1..15}; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
            if [ "$RESPONSE" = "200" ]; then
              HEALTH_DATA=$(curl -s "$HEALTH_URL")
              echo "Health check passed!"
              echo "Response: $HEALTH_DATA"
              exit 0
            fi
            echo "Attempt $i failed (HTTP $RESPONSE), retrying in 15 seconds..."
            sleep 15
          done
          
          echo "Production health check failed after 15 attempts"
          exit 1

      - name: Run Post-Deployment Tests
        run: |
          BASE_URL="${{ secrets.VERCEL_PROD_URL }}"
          echo "Running post-deployment tests against: $BASE_URL"
          
          # Test health endpoint
          curl -f "$BASE_URL/api/health" || exit 1
          
          # Test home page loads
          curl -f "$BASE_URL" || exit 1
          
          echo "All post-deployment tests passed!"

